<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hanish Vadlamudi — Portfolio</title>
    <meta name="description" content="Hanish Vadlamudi — projects, experience, and more." />
    <link rel="icon" href="ahh.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { --orange: #e85d04; --orange-pale: #f4a67a; }

      html, body { height: 100%; overflow: hidden; }

      body {
        font-family: 'Barlow', Arial, sans-serif;
        background: #fff;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        height: 100svh;
        cursor: url("cursors/cursor.cur"), auto;
      }

      a { text-decoration: none; color: inherit; cursor: url("cursors/hand.cur"), pointer; }
      a:hover { opacity: 0.8; }

      /* ── Header ── */
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 2.25rem 3.5rem 1.25rem;
      }

      .hdr__name {
        font-size: clamp(2.4rem, 4.5vw, 3.8rem);
        font-weight: 900;
        color: var(--orange);
        letter-spacing: -0.02em;
      }

      .hdr__resume {
        font-size: clamp(2.4rem, 4.5vw, 3.8rem);
        font-weight: 300;
        color: var(--orange);
        letter-spacing: -0.02em;
      }

      /* ── Nav ── */
      .nav {
        margin: 0 3.5rem;
        background: var(--orange);
        border-radius: 999px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 0.6rem 1rem;
      }

      .nav a {
        color: #fff;
        text-align: center;
        font-family: 'Barlow', Arial, sans-serif;
        font-size: clamp(0.85rem, 1.4vw, 1.1rem);
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      /* ── Hero ── */
      .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      .hero-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(1.5rem, 5vw, 5rem);
      }

      /* single SVG handles circle + spinning ring together */
      .hero-svg {
        width: clamp(260px, 48vh, 420px);
        height: clamp(260px, 48vh, 420px);
        overflow: visible;
        flex-shrink: 0;
      }

      .ring-group {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 22s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      .arrow {
        font-size: clamp(2rem, 4vh, 3.2rem);
        color: var(--orange);
        line-height: 1;
        flex-shrink: 0;
      }

      /* ── Footer ── */
      .ftr {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0.75rem 3rem 2.25rem;
      }

      .ftr__date,
      .ftr__time {
        font-family: 'Barlow', Arial, sans-serif;
        font-size: clamp(2.8rem, 6.5vw, 5.5rem);
        font-weight: 300;
        color: var(--orange-pale);
        letter-spacing: -0.02em;
        line-height: 1;
      }
    </style>
  </head>
  <body>

    <header class="hdr">
      <span class="hdr__name">hanish.</span>
      <a class="hdr__resume" href="Hanish.pdf" target="_blank" rel="noopener noreferrer">resume</a>
    </header>

    <nav class="nav" aria-label="Primary">
      <a href="projects.html">projects</a>
      <a href="experience.html">experience</a>
      <a href="gallery.html">gallery</a>
      <a href="about.html">about me</a>
    </nav>

    <main class="hero">
      <div class="hero-inner">

        <!--
          Single SVG: viewBox centered at 0,0.
          Circle r=100. Text orbits at r=138.
          Total viewBox span = 2*(138+18) = 312 → viewBox="-156 -156 312 312"
        -->
        <svg class="hero-svg" viewBox="-156 -156 312 312" aria-hidden="true">
          <!-- Static orange circle -->
          <circle cx="0" cy="0" r="100" fill="#e85d04" />

          <!-- Spinning text ring -->
          <g class="ring-group">
            <defs>
              <path id="orbit"
                d="M 0,-138
                   A 138,138 0 0,1  138,0
                   A 138,138 0 0,1  0,138
                   A 138,138 0 0,1 -138,0
                   A 138,138 0 0,1  0,-138" />
            </defs>
            <text font-family="'Barlow',Arial,sans-serif"
                  font-size="11.5"
                  font-weight="700"
                  fill="#e85d04"
                  letter-spacing="2">
              <textPath href="#orbit">
                ✠❃✠ LISTENING: CITY POP CLASSICS ✠❃✠ PLAYING: ELDEN RING ✠❃✠ READING: THE ISLAND OF DR. MOREAU ✠❃✠&#x20;
              </textPath>
            </text>
          </g>
        </svg>

        <div class="arrow" aria-hidden="true">&#x2192;</div>

      </div>
    </main>

    <footer class="ftr">
      <div class="ftr__date" id="ftr-date"></div>
      <div class="ftr__time" id="ftr-time"></div>
    </footer>

    <script>
      function pad(n) { return String(n).padStart(2, '0'); }
      function tick() {
        const now = new Date();
        document.getElementById('ftr-date').textContent =
          pad(now.getMonth() + 1) + '/' + pad(now.getDate()) + '/' + now.getFullYear();
        const h = now.getHours() % 12 || 12;
        document.getElementById('ftr-time').textContent = h + ':' + pad(now.getMinutes());
      }
      tick();
      setInterval(tick, 1000);
    </script>

  </body>
</html>
